<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Femi Samuel Adeola — Applied AI Researcher specialising in Trustworthy AI, LLMs, and Retrieval-Augmented Generation. MSc candidate at FURG, Brazil.">
<meta name="keywords" content="Trustworthy AI, LLMs, RAG, Explainable AI, Educational Data Mining, CAPES, FURG, Neuro-Symbolic AI">
<meta property="og:title" content="Femi Samuel Adeola — Applied AI Researcher">

<title>Femi Samuel Adeola</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #080c10;
    --bg2:       #0d1219;
    --bg3:       #111820;
    --border:    rgba(255,255,255,0.07);
    --border2:   rgba(255,255,255,0.12);
    --text:      #e8edf2;
    --muted:     #6b7a8d;
    --subtle:    #3d4d5c;
    --accent:    #4db8ff;
    --accent2:   #7dd3fc;
    --accent-bg: rgba(77,184,255,0.08);
    --green:     #34d399;
    --amber:     #fbbf24;
    --serif:     'Instrument Serif', Georgia, serif;
    --sans:      'Geist', system-ui, sans-serif;
    --mono:      'Geist Mono', monospace;
    --max:       1100px;
    --radius:    10px;
  }

  /* Added scroll-padding-top to prevent the fixed nav from covering section titles */
  html { 
    scroll-behavior: smooth; 
    scroll-padding-top: 80px; 
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  /* ── NOISE TEXTURE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    height: 56px;
    background: rgba(8,12,16,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: var(--serif);
    font-size: 1.05rem;
    color: var(--text);
    text-decoration: none;
    letter-spacing: 0.01em;
  }

  .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
  }

  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--accent); }

  .nav-cta {
    background: var(--accent-bg);
    color: var(--accent) !important;
    border: 1px solid rgba(77,184,255,0.25);
    padding: 0.35rem 1rem;
    border-radius: 6px;
    transition: background 0.2s, border-color 0.2s !important;
  }

  .nav-cta:hover {
    background: rgba(77,184,255,0.15) !important;
    border-color: rgba(77,184,255,0.4) !important;
    color: var(--accent2) !important;
  }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding: 5rem 2rem 4rem;
    position: relative;
    overflow: hidden;
  }

  .hero::after {
    content: '';
    position: absolute;
    top: -200px; right: -200px;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(77,184,255,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-inner {
    max-width: var(--max);
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 4rem;
    align-items: center;
    width: 100%;
  }

  .hero-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--accent-bg);
    border: 1px solid rgba(77,184,255,0.2);
    color: var(--accent);
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.3rem 0.8rem;
    border-radius: 100px;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.6s ease both;
  }

  .hero-tag::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .hero h1 {
    font-family: var(--serif);
    font-size: clamp(2.8rem, 6vw, 4.5rem);
    font-weight: 400;
    line-height: 1.08;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 1.5rem;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .hero h1 em {
    font-style: italic;
    color: var(--accent2);
  }

  .hero-bio {
    font-size: 1rem;
    color: var(--muted);
    line-height: 1.8;
    max-width: 560px;
    margin-bottom: 2rem;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .hero-bio strong { color: var(--text); font-weight: 500; }

  .hero-actions {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.6rem 1.4rem;
    border-radius: var(--radius);
    font-size: 0.85rem;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.2s;
    cursor: pointer;
    border: none;
  }

  .btn-primary {
    background: var(--accent);
    color: #080c10;
  }

  .btn-primary:hover {
    background: var(--accent2);
    transform: translateY(-1px);
  }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border2);
  }

  .btn-ghost:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-1px);
  }

  /* ── HERO CARD ── */
  .hero-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    animation: fadeUp 0.6s 0.2s ease both;
    position: relative;
    overflow: hidden;
  }

  .hero-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .avatar-wrap {
    width: 120px; height: 120px;
    border-radius: 16px;
    overflow: hidden;
    border: 2px solid var(--border2);
    margin-bottom: 1rem;
    background: var(--bg3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--serif);
    font-size: 1.8rem;
    color: var(--accent);
  }

  .avatar-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .hero-card h3 {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 0.25rem;
  }

  .hero-card .role {
    font-size: 0.8rem;
    color: var(--accent);
    margin-bottom: 1.25rem;
  }

  .card-meta {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    margin-bottom: 1.5rem;
  }

  .card-meta-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.78rem;
    color: var(--muted);
  }

  .card-meta-item svg {
    width: 14px; height: 14px;
    color: var(--subtle);
    flex-shrink: 0;
  }

  .social-links {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
  }

  .social-link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.35rem 0.7rem;
    border-radius: 6px;
    font-size: 0.72rem;
    font-weight: 500;
    text-decoration: none;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--muted);
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .social-link:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-bg);
  }

  /* ── STATS BAR ── */
  .stats-bar {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 2rem;
  }

  .stats-inner {
    max-width: var(--max);
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2rem;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: var(--serif);
    font-size: 2rem;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 0.3rem;
  }

  .stat-label {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* ── SECTIONS ── */
  section {
    padding: 5rem 2rem;
    position: relative;
  }

  section:nth-child(even) { background: var(--bg2); }

  .section-inner {
    max-width: var(--max);
    margin: 0 auto;
  }

  .section-label {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.75rem;
  }

  .section-label::before {
    content: '';
    width: 20px; height: 1px;
    background: var(--accent);
  }

  .section-title {
    font-family: var(--serif);
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.15;
    margin-bottom: 1rem;
  }

  .section-sub {
    font-size: 0.95rem;
    color: var(--muted);
    max-width: 580px;
    line-height: 1.75;
    margin-bottom: 3rem;
  }

  /* ── RESEARCH INTERESTS ── */
  .interests-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 1rem;
  }

  .interest-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    transition: border-color 0.2s, transform 0.2s;
  }

  .interest-card:hover {
    border-color: var(--border2);
    transform: translateY(-2px);
  }

  .interest-icon {
    font-size: 1.3rem;
    margin-bottom: 0.6rem;
  }

  .interest-title {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 0.4rem;
  }

  .interest-desc {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.6;
  }

  /* ── RESEARCH PROJECT ── */
  .project-feature {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }

  .project-feature-header {
    padding: 2rem 2.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 2rem;
  }

  .project-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: rgba(52,211,153,0.1);
    border: 1px solid rgba(52,211,153,0.25);
    color: var(--green);
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.25rem 0.7rem;
    border-radius: 100px;
    margin-bottom: 0.75rem;
  }

  .project-feature h3 {
    font-family: var(--serif);
    font-size: 1.4rem;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.01em;
    margin-bottom: 0.5rem;
  }

  .project-feature p {
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.7;
    max-width: 560px;
  }

  .project-link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    color: var(--accent);
    font-size: 0.78rem;
    font-weight: 500;
    text-decoration: none;
    white-space: nowrap;
    padding: 0.5rem 1rem;
    border: 1px solid rgba(77,184,255,0.25);
    border-radius: 8px;
    background: var(--accent-bg);
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .project-link:hover {
    background: rgba(77,184,255,0.15);
    border-color: rgba(77,184,255,0.4);
  }

  .project-metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    padding: 1.5rem 2.5rem;
    gap: 1.5rem;
  }

  .metric {
    display: flex;
